services:
  vllm:
    image: ${VLLM_IMAGE}
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    entrypoint:
      - /bin/bash
      - /workspace/start-vllm.sh
    gpus: all
    ipc: host
    ports:
      - "${HOST_PORT}:8000"
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).status == 200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 30s
    environment:
      HF_HOME: /root/.cache/huggingface
      HF_TOKEN: ${HF_TOKEN}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      MODEL_ID: ${MODEL_ID}
      SERVED_MODEL_NAME: ${SERVED_MODEL_NAME}
      API_KEY: ${API_KEY}
      DTYPE: ${DTYPE}
      TENSOR_PARALLEL_SIZE: ${TENSOR_PARALLEL_SIZE}
      GPU_MEMORY_UTILIZATION: ${GPU_MEMORY_UTILIZATION}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN}
      MAX_NUM_SEQS: ${MAX_NUM_SEQS}
      CPU_OFFLOAD_GB: ${CPU_OFFLOAD_GB}
      TRUST_REMOTE_CODE: ${TRUST_REMOTE_CODE}
      ENABLE_PREFIX_CACHING: ${ENABLE_PREFIX_CACHING}
      ENABLE_AUTO_TOOL_CHOICE: ${ENABLE_AUTO_TOOL_CHOICE}
      TOOL_CALL_PARSER: ${TOOL_CALL_PARSER}
      CHAT_TEMPLATE: ${CHAT_TEMPLATE}
      EXTRA_ARGS: ${EXTRA_ARGS}
    volumes:
      - ./data/hf-cache:/root/.cache/huggingface
      - ./models:/models
      - ./scripts/container/start-vllm.sh:/workspace/start-vllm.sh:ro

  open-webui:
    image: ${OPEN_WEBUI_IMAGE}
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      vllm:
        condition: service_healthy
    ports:
      - "${OPEN_WEBUI_PORT}:8080"
    environment:
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      ENABLE_OLLAMA_API: "false"
      ENABLE_OPENAI_API: "true"
      OPENAI_API_BASE_URLS: http://vllm:8000/v1
      OPENAI_API_KEYS: ${API_KEY}
      DEFAULT_MODELS: ${SERVED_MODEL_NAME}
      TASK_MODEL_EXTERNAL: ${SERVED_MODEL_NAME}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/open-webui:/app/backend/data
